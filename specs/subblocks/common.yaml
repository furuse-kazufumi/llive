# 共通 sub-block 群 (normalization / residual)

- schema_version: 1
  name: pre_norm
  version: "1.0.0"
  io_contract:
    input:  { hidden_dim: int, seq_dim: true, extras: [] }
    output: { hidden_dim: int, seq_dim: true, extras: [] }
  trainable: true
  supports_streaming: true
  latency_cost_per_token_ms: 0.01
  vram_cost_mb: 0.0
  config_schema:
    type: object
    required: [method]
    properties:
      method: { enum: [layer_norm, rms_norm] }
      eps:    { type: number, default: 1.0e-5 }
      affine: { type: boolean, default: true }
  plugin_module: llive.subblocks.norm:PreNorm

- schema_version: 1
  name: residual
  version: "1.0.0"
  io_contract:
    input:  { hidden_dim: int, seq_dim: true, extras: [skip] }
    output: { hidden_dim: int, seq_dim: true, extras: [] }
  trainable: false
  supports_streaming: true
  latency_cost_per_token_ms: 0.005
  vram_cost_mb: 0.0
  config_schema:
    type: object
    properties:
      scale: { type: number, default: 1.0 }
  plugin_module: llive.subblocks.residual:Residual
