schema_version: 1
container_id: adaptive_reasoning_v1
routing_tags: [reasoning, long_context]
cost_profile:
  latency: medium
  vram: medium
subblocks:
  - type: pre_norm
  - type: causal_attention
  - type: memory_read
    config:
      source: [semantic, episodic]
      top_k: 4
  - type: ffn_swiglu
  - type: memory_write
    config:
      policy: surprise_gated
      target: semantic
      # surprise threshold は block 内部で適用 (SurpriseGate.theta, default 0.3)
      # condition: surprise_gt をここに置くと block 実行前に評価されてしまうため不要
