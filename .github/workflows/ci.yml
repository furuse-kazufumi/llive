name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + verify Z3 extras)
        # `[verify]` で Z3 SMT 検証レイヤを引き、tests/unit/test_verifier.py が通る。
        # `[torch]` は HF/faiss/peft 等の重い依存を引くため CI では入れない (別 matrix で扱う)。
        run: pip install -e ".[verify,dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Run tests with coverage
        run: python -m pytest --cov=llive --cov-fail-under=80 -q

  rust-build:
    name: Rust extension build (pyo3 0.24.2)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release
        working-directory: crates/llive_rust_ext
        run: cargo build --release

      - name: cargo test (parity harness via Python)
        run: |
          pip install -e ".[verify,dev]"
          pip install maturin
          maturin develop --release --manifest-path crates/llive_rust_ext/Cargo.toml
          python -m pytest tests/property/test_rust_python_parity.py -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build
      - name: Verify dist files
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: llive-dist
          path: dist/*
