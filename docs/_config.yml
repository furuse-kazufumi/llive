# GitHub Pages (Jekyll) configuration
# Activate via: GitHub repo Settings → Pages → Build & deploy → Source: main branch / docs folder

title: "FullSense ™ — llive"
description: "Self-evolving modular memory LLM framework — biological memory × formal verification × industrial IoT mesh × TUI HITL"
remote_theme: just-the-docs/just-the-docs
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-remote-theme

# just-the-docs configuration
color_scheme: light
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-\/]+/
  rel_url: true
  button: false
heading_anchors: true
aux_links:
  "GitHub":
    - "https://github.com/furuse-kazufumi/llive"
  "PyPI":
    - "https://pypi.org/project/llmesh-llive/"
aux_links_new_tab: true
footer_content: 'Copyright &copy; 2026 Kazufumi Furuse. FullSense ™ / llive ™ / llmesh ™ / llove ™ are trademarks. Code under <a href="https://github.com/furuse-kazufumi/llive/blob/main/LICENSE">Apache-2.0</a>.'
nav_external_links:
  - title: GitHub repository
    url: https://github.com/furuse-kazufumi/llive
    hide_icon: false
back_to_top: true
back_to_top_text: "Back to top"
relative_links:
  enabled: true
  collections: true
include:
  - CONTRIBUTING.md
  - LICENSE
  - LICENSE-COMMERCIAL
  - NOTICE
  - TRADEMARK.md
  - SECURITY.md
defaults:
  - scope:
      path: ""
    values:
      layout: default
# Footer / author
author: Kazufumi Furuse
github:
  repository_nwo: furuse-kazufumi/llive
url: https://furuse-kazufumi.github.io/llive
baseurl: ""
show_downloads: false
