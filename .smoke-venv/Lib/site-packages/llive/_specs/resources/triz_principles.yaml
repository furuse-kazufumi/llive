# TRIZ 40 発明原理 — llive 内蔵リソース
#
# 各原理に "llive_applications" として **llive 文脈での具体応用例** を 3 つ以上記載。
# RAD コーパス分野へのマッピングも明示。
# FR-24 / FR-25 が参照する。
#
# 参考: Altshuller "And Suddenly the Inventor Appeared" / Wikipedia: TRIZ

- id: 1
  name: Segmentation
  jp: 分割
  brief: 対象を独立部分に分ける、容易に分解できるようにする、分割度を上げる
  llive_applications:
    - "モノリシック Transformer block を sub-block 列に分割 (FR-02)"
    - "4 層メモリへの分離 (semantic/episodic/structural/parameter)"
    - "candidate を独立 namespace に分離 (experiment/staging/production)"
  rad_domains: [agents, industrial_iot, distributed_systems]

- id: 2
  name: Taking out / Extraction
  jp: 引き出し
  brief: 邪魔な要素を取り出す、必要な要素だけ抽出する
  llive_applications:
    - "不要 memory node の prune (Memory Phase Manager)"
    - "dead block の自動 prune"
    - "untrusted source を quarantine zone に分離"
  rad_domains: [security, cognitive_ai]

- id: 3
  name: Local Quality
  jp: 局所的性質
  brief: 均質構造を不均質に、各部分に異なる機能・最適化を持たせる
  llive_applications:
    - "memory layer ごとに pollution policy を変える (FR-05 補強)"
    - "task_conditioned adapter で task ごとの局所最適化"
    - "container_diversity を上げる (異なる cost profile)"
  rad_domains: [cognitive_ai, mlops]

- id: 4
  name: Asymmetry
  jp: 非対称化
  brief: 対称を非対称に、既存の非対称をさらに強調
  llive_applications:
    - "GQA (Q heads ≫ KV heads) 構造"
    - "online vs offline の処理量非対称"
    - "trusted vs quarantine zone の権限非対称"
  rad_domains: [neural_network, security]

- id: 5
  name: Merging / Consolidation
  jp: 統合
  brief: 同種要素や時間的近接操作を統合する
  llive_applications:
    - "consolidation cycle で episodic を semantic にまとめる (FR-12)"
    - "fused QKV / fused gate_up"
    - "複数 task を 1 forward で同時評価 (TRIZ #6 と併用)"
  rad_domains: [neural_signal, cognitive_ai]

- id: 6
  name: Universality
  jp: 多用途化
  brief: 1 つで複数の機能を兼ねさせる
  llive_applications:
    - "1 candidate を複数 task で同時評価 (FR-04 補強)"
    - "memory_read sub-block が 4 種の memory 全部に共通インターフェース"
    - "llmesh I/O bus が memory backend と event bus を兼ねる"
  rad_domains: [agents, distributed_systems]

- id: 7
  name: Nested Doll
  jp: 入れ子
  brief: A の中に B を、さらに C を入れる
  llive_applications:
    - "BlockContainer に nested_container を再帰許容 (FR-02 + Composite pattern)"
    - "AdapterProfile に LoRA-of-LoRA"
    - "Saga 補償 step を多段ネスト"
  rad_domains: [agents, formal_methods]

- id: 8
  name: Anti-Weight / Counter-balance
  jp: 釣り合い
  brief: 重さの問題を、別の力で打ち消す
  llive_applications:
    - "forgetting (重い) を replay (相反する力) で打ち消す"
    - "router_entropy の偏りを stochastic noise で補正"
  rad_domains: [reinforcement_learning, neural_signal]

- id: 9
  name: Preliminary Anti-Action
  jp: 先取り反作用
  brief: 副作用を予測して、先に打ち消す
  llive_applications:
    - "Static Verifier (FR-13) で評価前に reject"
    - "forgetting 兆候を Reverse-Evolution Monitor (FR-22) で先に検出"
  rad_domains: [formal_methods, automated_theorem_proving]

- id: 10
  name: Preliminary Action / Prior Action
  jp: 先取り作用
  brief: 必要前に作業を済ませる
  llive_applications:
    - "execution plan を YAML から事前コンパイル"
    - "consolidation を低負荷時間に先取り実行 (FR-12)"
    - "zero-cost proxy で評価コストを先回りで圧縮"
  rad_domains: [mlops, distributed_systems]

- id: 11
  name: Cushioning in Advance
  jp: 緩衝
  brief: 失敗 / 損失に備えて緩衝材を用意
  llive_applications:
    - "Memento snapshot で promote 前後 (Saga 補償)"
    - "staging 環境 (production への緩衝)"
    - "trust roots に複数鍵 (1 鍵失効でも継続)"
  rad_domains: [security, formal_methods, distributed_systems]

- id: 12
  name: Equipotentiality
  jp: 等ポテンシャル
  brief: 高低差を消す、位置エネルギー無しで動作
  llive_applications:
    - "container_diversity を均一化 (一部 container に依存しない)"
    - "Fairness 機構で candidate 間の評価予算を等配"
  rad_domains: [reinforcement_learning, distributed_systems]

- id: 13
  name: The Other Way Around / Inversion
  jp: 逆転
  brief: 反対のことをやる
  llive_applications:
    - "コア更新の代わりに hidden_remap で入力側を再射影"
    - "成功例ではなく失敗例で mutation policy を学習 (Failed-Candidate Reservoir, FR-15)"
    - "online 適応の代わりに offline 審査"
  rad_domains: [reinforcement_learning, cognitive_ai]

- id: 14
  name: Spheroidality / Curvature
  jp: 球面化
  brief: 直線を曲線に、平面を球面に
  llive_applications:
    - "離散 ChangeOp を連続パラメータ空間に埋め込み (NAS embedding)"
  rad_domains: [neural_network, optimization]

- id: 15
  name: Dynamicity
  jp: 動性化
  brief: 静的な要素を動的に
  llive_applications:
    - "adapter rank を不確実性で動的変更 (rank_modulation)"
    - "router 閾値を runtime で適応的に変更"
    - "Surprise-Bayesian Write Gate (FR-21) の θ 動的化"
  rad_domains: [reinforcement_learning, neuromorphic]

- id: 16
  name: Partial / Excessive Action
  jp: 部分的に
  brief: ちょうどよくが難しいなら、多少多くか少なくにする
  llive_applications:
    - "shadow eval を意図的に粗く (precision を下げて多くを評価, FR-14)"
    - "consolidation で要約は粗めにして件数を稼ぐ"
  rad_domains: [tinyml, mlops]

- id: 17
  name: Another Dimension
  jp: 多次元化
  brief: 1 次元を 2D/3D に、空間使用を変える
  llive_applications:
    - "scalar surprise を Bayesian (mean+variance) に拡張 (FR-21)"
    - "1D sub-block 列に nested branch を加える (FR-02 拡張)"
    - "memory backend を vector + graph + time-series + adapter の多次元へ"
  rad_domains: [multimodal, neural_dataset]

- id: 18
  name: Vibration / Oscillation
  jp: 振動
  brief: 振動・揺らぎを加える
  llive_applications:
    - "停滞 candidate に温度スケジュール付き高分散 mutation"
    - "router を stochastic mode に切替えて経路揺らぎを生む"
  rad_domains: [reinforcement_learning, optimization]

- id: 19
  name: Periodic Action
  jp: 周期化
  brief: 連続作用を周期にする
  llive_applications:
    - "海馬-皮質 consolidation サイクル (FR-12)"
    - "online write / offline summarize の交互運用"
    - "Self-Reflection mode を定期 cron で起動"
  rad_domains: [neural_signal, cognitive_ai, mlops]

- id: 20
  name: Continuity of Useful Action
  jp: 有用作用継続
  brief: 休みなく動作させる
  llive_applications:
    - "memory write を always-on でなく gated, ただし *監視*は常時"
    - "Reverse-Evolution Monitor 常時稼働 (FR-22)"
  rad_domains: [reinforcement_learning, mlops]

- id: 21
  name: Hurrying / Rushing Through
  jp: 高速化
  brief: 害が出る作業は超高速で済ます
  llive_applications:
    - "INT8 / 4bit shadow eval (FR-14) で害ある探索を超高速に"
    - "TTL 過ぎた memory を一括 sweep"
  rad_domains: [tinyml, mlops]

- id: 22
  name: Convert Harm into Benefit / Blessing in Disguise
  jp: 災い転じて福
  brief: 害を利用する、害を別の害で打ち消す
  llive_applications:
    - "catastrophic forgetting を不要記憶 prune シグナルとして再利用"
    - "failed candidate を学習データ化 (FR-15)"
  rad_domains: [reinforcement_learning, cognitive_ai]

- id: 23
  name: Feedback
  jp: フィードバック
  brief: 出力を入力に戻す
  llive_applications:
    - "Failed-Candidate Reservoir → mutation policy 学習 (FR-15)"
    - "router decision log を learned router の学習に使用"
  rad_domains: [reinforcement_learning, formal_methods]

- id: 24
  name: Mediator / Intermediary
  jp: 仲介
  brief: 中継物・中間オブジェクトを挟む
  llive_applications:
    - "Static Verifier (FR-13) が LLM 評価との仲介"
    - "llmesh I/O bus が sensor と memory の仲介 (FR-19)"
    - "Adapter / Bridge pattern 全般"
  rad_domains: [distributed_systems, formal_methods]

- id: 25
  name: Self-Service
  jp: セルフサービス
  brief: 対象自身に作業をやらせる
  llive_applications:
    - "llive 自身が TRIZ で自分を改善 (FR-23〜FR-27)"
    - "Self-Reflection mode"
    - "audit log の連鎖ハッシュを自己検証"
  rad_domains: [agents, formal_methods]

- id: 26
  name: Copying
  jp: コピー
  brief: 高価な原物の代わりに安い複製を使う
  llive_applications:
    - "Multi-precision Shadow Eval (INT8/4bit コピー, FR-14)"
    - "Candidate Arena で複数 candidate 並列対局"
  rad_domains: [tinyml, distributed_systems]

- id: 27
  name: Cheap Short-Living Objects
  jp: 使い捨て
  brief: 高耐久 1 つより、使い捨て複数
  llive_applications:
    - "短期 episodic memory は raw 保存、長期になる前に消去 or 凝集"
    - "短時間 LoRA で実験、長期化前に再評価"
  rad_domains: [cognitive_ai, mlops]

- id: 28
  name: Mechanics Substitution
  jp: 機械系の置換
  brief: 物理機構を電磁/光/化学に置換
  llive_applications:
    - "explicit rule-based router → learned policy (RL) への移行"
    - "決定的選択を Bayesian uncertainty に置換 (FR-21)"
  rad_domains: [reinforcement_learning]

- id: 29
  name: Pneumatics / Hydraulics
  jp: 流体
  brief: 気体・液体に置き換える
  llive_applications:
    - "rigid sub-block 列を「流体的」に流れる pipeline へ (Pipes & Filters)"
    - "memory event を streaming で流す"
  rad_domains: [distributed_systems]

- id: 30
  name: Flexible Shells / Thin Films
  jp: 柔らかい膜
  brief: 硬い境界を柔らかく
  llive_applications:
    - "trusted/quarantine 境界に明示 zone tag を hidden_state に伝播 (硬い壁ではなく柔らかい透過)"
  rad_domains: [security]

- id: 31
  name: Porous Materials
  jp: 多孔質
  brief: 空隙・通路を持たせる
  llive_applications:
    - "skip connection / residual で「素通り穴」"
    - "sparse FFN で活性化次元を多孔質化"
  rad_domains: [neural_network, optimization]

- id: 32
  name: Color Change
  jp: 色変化
  brief: 視認性を変える、透明にする
  llive_applications:
    - "candidate state を llove TUI で色付け (red=risky, green=safe)"
    - "quarantine zone source 由来 retrieval をプロンプトで明示タグ付け"
  rad_domains: [hci]

- id: 33
  name: Homogeneity
  jp: 同質性
  brief: 似た材料同士の作用にする
  llive_applications:
    - "全 sub-block を同一 IO 契約に揃える (Strategy pattern)"
  rad_domains: [agents, formal_methods]

- id: 34
  name: Discarding and Recovering
  jp: 排除と再生
  brief: 使ったら消し、必要なら再生
  llive_applications:
    - "tombstone 付き node 削除 + 監査ログから再生可能"
    - "Memory Phase: archive → erase → 必要時 reload"
  rad_domains: [cognitive_ai, security]

- id: 35
  name: Parameter Changes
  jp: パラメータ変化
  brief: 状態 / パラメータ自体を変える
  llive_applications:
    - "surprise score を scalar → Bayesian (FR-21)"
    - "precision を fp16 ⇄ int8 ⇄ int4 動的切替"
    - "rank を runtime で変更"
  rad_domains: [tinyml, neuromorphic, reinforcement_learning]

- id: 36
  name: Phase Transitions
  jp: 相変化
  brief: 物質の相を変える
  llive_applications:
    - "Memory Phase Manager: short → mid → long → archived → erased (FR-16)"
    - "candidate state machine の遷移"
  rad_domains: [cognitive_ai, neural_signal]

- id: 37
  name: Thermal Expansion
  jp: 熱膨張
  brief: 温度差を利用
  llive_applications:
    - "exploration temperature (softmax T) で探索強度を制御"
  rad_domains: [reinforcement_learning, optimization]

- id: 38
  name: Strong Oxidants / Boosted Environment
  jp: 強い酸化剤
  brief: 反応を促進する環境を作る
  llive_applications:
    - "意図的に高 surprise シナリオを mutation で発生させる"
    - "難タスクを意図的に投入して forgetting を顕在化させベンチ精度を上げる"
  rad_domains: [reinforcement_learning]

- id: 39
  name: Inert Atmosphere
  jp: 不活性雰囲気
  brief: 反応を抑える不活性環境
  llive_applications:
    - "Quarantined Memory Zone (FR-17)"
    - "Signed Adapter のみ load 許可 (FR-18)"
    - "experiment namespace の隔離"
  rad_domains: [security, cryptography]

- id: 40
  name: Composite Materials
  jp: 複合材料
  brief: 単一素材を複合材料に置換
  llive_applications:
    - "Mixture-of-Experts (moe_ffn)"
    - "複合 router (rule + learned + bandit)"
    - "複合 evaluator (static + shadow + short + long + HITL)"
  rad_domains: [neural_network, reinforcement_learning, formal_methods]
