# TRIZ 矛盾マトリクス (compact) — llive 内蔵リソース
#
# 完全な 39×39 = 1521 セルではなく、llive の主要矛盾に関わる
# **十数組**だけを当面記載した compact 版。
# Phase 2 で公開データ (https://triz40.com 等) を取り込んで完全版に拡張する。
#
# 形式: improve_feature_id -> degrade_feature_id -> [recommended_principle_ids]
# 値は経験則による推奨であり、Altshuller 原典の値とは異なる場合がある。

# === llive コア矛盾 ===

# 9. 速度 (improve) vs 13. 安定性 (degrade)
9:
  13: [13, 15, 19, 28]              # 逆転, 動性化, 周期化, 機械系置換
  27: [13, 19, 35]                  # 信頼性
  31: [22, 35, 39]                  # 有害副作用

# 35. 適応性・多用途性 (improve)
35:
  9: [1, 6, 15, 35]                 # 速度
  13: [1, 7, 13, 22, 35]            # 安定性
  25: [10, 19, 26]                  # 時間損失
  27: [11, 35, 39]                  # 信頼性
  31: [3, 22, 35, 36, 39]           # 有害副作用
  32: [1, 13, 35]                   # 装置複雑さ

# 26. 物質の量 (improve)
26:
  31: [3, 22, 35, 36, 39]           # 有害副作用 (記憶汚染)
  25: [10, 19]                      # 時間損失
  13: [22, 36]                      # 安定性

# 6. 多用途性 (improve, llive 固有特性として追加)
6:
  25: [6, 19, 26, 35]               # 時間損失
  32: [1, 35]                       # 装置複雑さ

# 25. 時間損失 (improve = 短縮)
25:
  35: [6, 18, 19, 26]               # 適応性悪化を抑える短縮策

# === メタ矛盾 (llive 固有) ===
# llive 固有特性を 100 番台に拡張。
# 101. forgetting (低い方がよい)
# 102. catastrophic_forgetting (低い方がよい)
# 103. memory_pollution (低い方がよい)
# 104. candidate_acceptance (高い方がよい)
# 105. compute_cost (低い方がよい)

# 速度 vs forgetting
9:
  101: [13, 19, 22]                 # 逆転, 周期化, 災い転じて福

# 適応性 vs forgetting
35:
  101: [1, 7, 13, 19, 22]
  102: [11, 22, 36, 39]             # 緩衝 + 相変化 + 不活性
  103: [3, 22, 35, 36, 39]

# 多用途性 vs compute
6:
  105: [19, 26, 35]                 # 周期化, コピー, パラメータ変化

# acceptance vs compute (探索広く vs 評価コスト)
104:
  105: [10, 18, 19, 23, 24, 26]    # 先取り作用, 振動, 周期化, FB, 仲介, コピー

# pollution vs memory_amount (記憶増 vs 汚染)
103:
  26: [3, 22, 36, 39]               # 局所性, 災い転じて福, 相変化, 不活性
