# TRIZ 矛盾マトリクス (compact) — llive 内蔵リソース
#
# 完全な 39×39 = 1521 セルではなく、llive の主要矛盾に関わる
# **十数組**だけを当面記載した compact 版。
# Phase 2 で公開データ (https://triz40.com 等) を取り込んで完全版に拡張する。
#
# 形式: improve_feature_id -> degrade_feature_id -> [recommended_principle_ids]
# 値は経験則による推奨であり、Altshuller 原典の値とは異なる場合がある。
#
# llive 固有特性 (100 番台):
#   101. forgetting (低い方がよい)
#   102. catastrophic_forgetting (低い方がよい)
#   103. memory_pollution (低い方がよい)
#   104. candidate_acceptance (高い方がよい)
#   105. compute_cost (低い方がよい)
#
# 重要: YAML duplicate top-level key を避けるため、improving_id ごとに
# 1 ブロックに統合済 (Phase 1 V0.1.1 packaging fix で正規化)。

# 6. 多用途性 (improve, llive 固有特性として追加)
6:
  25: [6, 19, 26, 35]               # 時間損失
  32: [1, 35]                       # 装置複雑さ
  105: [19, 26, 35]                 # compute (周期化, コピー, パラメータ変化)

# 9. 速度 (improve)
9:
  13: [13, 15, 19, 28]              # 安定性 (逆転, 動性化, 周期化, 機械系置換)
  27: [13, 19, 35]                  # 信頼性
  31: [22, 35, 39]                  # 有害副作用
  101: [13, 19, 22]                 # forgetting (逆転, 周期化, 災い転じて福)

# 25. 時間損失 (improve = 短縮)
25:
  35: [6, 18, 19, 26]               # 適応性悪化を抑える短縮策

# 26. 物質の量 (improve, 記憶量)
26:
  13: [22, 36]                      # 安定性
  25: [10, 19]                      # 時間損失
  31: [3, 22, 35, 36, 39]           # 有害副作用 (記憶汚染)

# 35. 適応性・多用途性 (improve)
35:
  9: [1, 6, 15, 35]                 # 速度
  13: [1, 7, 13, 22, 35]            # 安定性
  25: [10, 19, 26]                  # 時間損失
  27: [11, 35, 39]                  # 信頼性
  31: [3, 22, 35, 36, 39]           # 有害副作用
  32: [1, 13, 35]                   # 装置複雑さ
  101: [1, 7, 13, 19, 22]           # forgetting
  102: [11, 22, 36, 39]             # catastrophic_forgetting (緩衝, 相変化, 不活性)
  103: [3, 22, 35, 36, 39]          # memory_pollution

# 103. memory_pollution (improve = 抑制)
103:
  26: [3, 22, 36, 39]               # 記憶量との両立 (局所性, 災い転じて福, 相変化, 不活性)

# 104. candidate_acceptance (improve = 高 acceptance rate)
104:
  105: [10, 18, 19, 23, 24, 26]     # compute 抑制下での探索広く (先取り作用, 振動, 周期化, FB, 仲介, コピー)
