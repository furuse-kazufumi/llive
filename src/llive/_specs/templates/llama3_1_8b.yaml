# Llama-3.1-8B Decoder-only LLM の ContainerSpec 化
#
# 出典: HuggingFace `meta-llama/Meta-Llama-3.1-8B-Instruct` の config.json
#       および公開モデルカード
#
# 用途:
# - Qwen2.5 系との比較ベンチマーク
# - 英語特化のコア候補

schema_version: 1
container_id: llama3_1_8b_v1
routing_tags: [reasoning, instruction, english, long-context, tool-use]
cost_profile:
  latency: medium
  vram: medium
  est_flops_per_token: 5200000000

model_metadata:
  family: llama
  hf_id: meta-llama/Meta-Llama-3.1-8B-Instruct
  num_hidden_layers: 32
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8              # GQA
  head_dim: 128
  norm: rms_norm
  norm_eps: 1.0e-5
  activation: silu
  position: rope
  rope_theta: 500000.0
  rope_scaling:
    rope_type: llama3                 # 8k → 128k への scale
    factor: 8.0
    high_freq_factor: 4.0
    low_freq_factor: 1.0
    original_max_position_embeddings: 8192
  max_position_embeddings: 131072
  vocab_size: 128256
  tie_word_embeddings: false

# Llama3.1 の block 構造は Qwen2.5 とほぼ同じ (GQA + SwiGLU + RMSNorm)
# 主な差分:
#   - hidden_size: 4096 vs 3584
#   - QKV bias: なし (Qwen2.5 はあり)
#   - rope_scaling: Llama3 特有 (Qwen2.5 にはなし)
subblocks:
  - type: pre_norm
    name: input_layernorm
    config: { method: rms_norm, eps: 1.0e-5 }

  - type: grouped_query_attention
    name: self_attn
    config:
      num_heads: 32
      num_kv_heads: 8
      head_dim: 128
      rope_theta: 500000.0
      rope_scaling:
        type: llama3
        factor: 8.0
      causal: true
      qk_norm: false
      bias_q: false
      bias_k: false
      bias_v: false
      bias_o: false

  - type: residual
    name: attn_residual

  - type: pre_norm
    name: post_attention_layernorm
    config: { method: rms_norm, eps: 1.0e-5 }

  - type: ffn_swiglu
    name: mlp
    config:
      hidden_size: 4096
      intermediate_size: 14336
      activation: silu
      gate_bias: false
      up_bias: false
      down_bias: false

  - type: residual
    name: ffn_residual

optional_extensions:
  - type: memory_read
    enabled: false
  - type: memory_write
    enabled: false
  - type: reflective_probe
    enabled: false
