# Mistral-7B-v0.3 Decoder-only LLM の ContainerSpec 化
#
# 出典: HuggingFace `mistralai/Mistral-7B-Instruct-v0.3` の config.json
#
# 注意:
# - v0.1 は sliding window attention あり、v0.3 では廃止
# - v0.3 で vocab が 32000 → 32768 に拡張 (function calling token 追加)

schema_version: 1
container_id: mistral_7b_v0_3_v1
routing_tags: [reasoning, instruction, function-calling, multilingual]
cost_profile:
  latency: medium
  vram: medium
  est_flops_per_token: 5200000000

model_metadata:
  family: mistral
  hf_id: mistralai/Mistral-7B-Instruct-v0.3
  num_hidden_layers: 32
  hidden_size: 4096
  intermediate_size: 14336
  num_attention_heads: 32
  num_key_value_heads: 8              # GQA
  head_dim: 128
  norm: rms_norm
  norm_eps: 1.0e-5
  activation: silu
  position: rope
  rope_theta: 1000000.0               # v0.2 で 10000 → 1M に変更
  sliding_window: null                # v0.3 で廃止
  max_position_embeddings: 32768
  vocab_size: 32768                    # v0.3 で拡張
  tie_word_embeddings: false

# Mistral-7B-v0.3 の block: Llama 系とほぼ同一構造
# 主な差分:
#   - vocab が小さい (32768)
#   - rope_theta = 1M (Llama3.1 は 500K)
#   - sliding window 廃止
subblocks:
  - type: pre_norm
    name: input_layernorm
    config: { method: rms_norm, eps: 1.0e-5 }

  - type: grouped_query_attention
    name: self_attn
    config:
      num_heads: 32
      num_kv_heads: 8
      head_dim: 128
      rope_theta: 1000000.0
      causal: true
      sliding_window: null
      qk_norm: false
      bias_q: false
      bias_k: false
      bias_v: false
      bias_o: false

  - type: residual
    name: attn_residual

  - type: pre_norm
    name: post_attention_layernorm
    config: { method: rms_norm, eps: 1.0e-5 }

  - type: ffn_swiglu
    name: mlp
    config:
      hidden_size: 4096
      intermediate_size: 14336
      activation: silu
      gate_bias: false
      up_bias: false
      down_bias: false

  - type: residual
    name: ffn_residual

optional_extensions:
  - type: memory_read
    enabled: false
  - type: memory_write
    enabled: false
  - type: reflective_probe
    enabled: false
